# TG-AI智控王 Electron Builder 配置
# 用於打包 Windows/Mac/Linux 安裝程序
# 版本: 2.1.0 全功能版

appId: com.tgmatrix.app
productName: TG-AI智控王
copyright: Copyright © 2026

directories:
  output: release
  buildResources: build-resources

# 包含的文件
files:
  - electron.js
  - preload.js
  - index.html
  - metadata.json
  - security-electron.js
  - auto-ai-setup.js
  - splash.html
  - package.json
  - dist/**/*
  - default-config/**/*
  - electron/**/*

# 額外資源（後端 exe 等）
extraResources:
  - from: backend-exe
    to: backend-exe
    filter:
      - "**/*"
      - "!**/sessions/**"
      - "!**/data/**"
      - "!**/logs/**"
      - "!**/*.db"
      - "!**/*.log"
  - from: default-config
    to: default-config
  # 🆕 包含 VC++ 運行時安裝程序
  - from: build-resources/vc_redist.x64.exe
    to: vc_redist.x64.exe

# Windows 配置
win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: ${productName}-${version}-Setup.${ext}
  icon: build-resources/icon.ico
  requestedExecutionLevel: asInvoker
  sign: null
  signingHashAlgorithms: null

# NSIS 安裝程序配置
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TG-AI智控王
  runAfterFinish: true
  menuCategory: false
  perMachine: false
  installerIcon: build-resources/icon.ico
  uninstallerIcon: build-resources/icon.ico
  installerHeaderIcon: build-resources/icon.ico
  deleteAppDataOnUninstall: false
  include: build-resources/installer.nsh
  license: null

# Mac 配置
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  category: public.app-category.productivity
  icon: build-resources/icon.icns

# Linux 配置
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  category: Network
  icon: build-resources
